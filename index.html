<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Jukebox 💀🎵</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { 
      background: #0a0a0a; 
      font-family: system-ui, sans-serif;
    }
    .pixel-font { font-family: 'Press Start 2P', system-ui; }
    .player-container { aspect-ratio: 16/9; }
    .song-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .song-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); }
  </style>
</head>
<body class="text-white">
  <div class="max-w-6xl mx-auto p-8">
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 bg-gradient-to-br from-red-600 to-yellow-400 rounded-2xl flex items-center justify-center text-5xl shadow-xl">💀</div>
        <div>
          <h1 class="pixel-font text-5xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-yellow-300">SKELETON JUKEBOX</h1>
          <p class="text-yellow-300/80 text-sm tracking-widest">ANYONE CAN REQUEST • QUEUE PLAYS IN ORDER</p>
        </div>
      </div>
      <div class="text-xs text-zinc-500 font-mono">v1.0 • Built for you by Grok</div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- PLAYER + NOW PLAYING -->
      <div class="lg:col-span-8">
        <div class="bg-zinc-950 border border-yellow-400/30 rounded-3xl overflow-hidden shadow-2xl">
          <div id="player-container" class="player-container bg-black">
            <div id="player" class="w-full h-full"></div>
          </div>
          
          <!-- Now Playing Info -->
          <div id="now-playing" class="px-8 py-6 hidden">
            <div class="flex gap-6 items-center">
              <div id="now-thumbnail" class="w-24 h-24 bg-zinc-900 rounded-2xl overflow-hidden ring-2 ring-yellow-400/50 flex-shrink-0"></div>
              <div class="flex-1 min-w-0">
                <div class="uppercase text-red-400 text-xs tracking-[3px] font-medium mb-1">NOW SCREAMING</div>
                <h2 id="now-title" class="text-3xl font-bold leading-tight truncate"></h2>
                <p id="now-requester" class="text-zinc-400 text-sm mt-1"></p>
              </div>
            </div>
          </div>
        </div>

        <!-- Controls -->
        <div class="flex gap-4 mt-6">
          <button onclick="skipCurrent()" 
                  class="flex-1 bg-red-600 hover:bg-red-700 transition-all py-6 rounded-3xl font-bold text-xl flex items-center justify-center gap-3 shadow-lg">
            ⏭️ SKIP THIS BANGER
          </button>
          <button onclick="clearQueue()" 
                  class="flex-1 bg-zinc-900 hover:bg-zinc-800 transition-all py-6 rounded-3xl font-bold text-xl flex items-center justify-center gap-3 border border-zinc-700">
            🗑️ NUKE QUEUE
          </button>
        </div>
      </div>

      <!-- QUEUE + ADD -->
      <div class="lg:col-span-4 space-y-8">
        <!-- Add Song -->
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
          <h3 class="font-bold text-2xl mb-6 flex items-center gap-3">
            <span class="text-yellow-400">📥</span> REQUEST A SONG
          </h3>
          <input id="url-input" 
                 type="text" 
                 placeholder="https://youtu.be/..." 
                 class="w-full bg-black border border-zinc-700 focus:border-yellow-400 rounded-2xl px-6 py-6 text-lg outline-none transition">
          <input id="requester-input" 
                 type="text" 
                 placeholder="Your name (optional)" 
                 value="Skeleton Fan" 
                 class="mt-4 w-full bg-black border border-zinc-700 focus:border-yellow-400 rounded-2xl px-6 py-6 text-lg outline-none transition">
          <button onclick="addSong()" 
                  class="mt-6 w-full bg-gradient-to-r from-yellow-400 to-red-500 hover:brightness-110 transition-all text-black font-black py-6 rounded-3xl text-2xl shadow-xl">
            THROW IT IN THE QUEUE 🔥
          </button>
          <p class="text-center text-zinc-500 text-xs mt-4">YouTube links only • Works on phones too</p>
        </div>

        <!-- Queue -->
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 flex flex-col h-[420px]">
          <div class="flex justify-between mb-6">
            <h3 class="font-bold text-2xl">UP NEXT <span id="queue-count" class="text-yellow-300">(0)</span></h3>
          </div>
          
          <div id="queue-list" class="flex-1 overflow-auto space-y-3 custom-scroll pr-2">
            <!-- JS populated -->
          </div>
          
          <div id="empty-state" class="flex-1 flex items-center justify-center text-center text-zinc-500 hidden">
            <div>
              <div class="text-6xl mb-4">💀</div>
              <p class="font-medium">Queue empty<br><span class="text-xs">Be the first to request a song</span></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let socket;
    let player;
    let currentId = null;
    let queueData = [];

    // Tailwind
    function initTailwind() {
      tailwind.config = { content: [] };
    }

    // YouTube IFrame API
    function loadYouTubeAPI() {
      const tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    }

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        width: '100%',
        height: '100%',
        playerVars: {
          autoplay: 1,
          controls: 1,
          modestbranding: 1,
          rel: 0,
          playsinline: 1
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange
        }
      });
    };

    function onPlayerReady() {
      console.log('%cSkeleton Jukebox player ready 💀', 'color:#eab308; font-weight:bold');
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        socket.emit('nextSong');
      }
    }

    function playSong(videoId) {
      currentId = videoId;
      if (player) player.loadVideoById(videoId);
    }

    function renderNowPlaying(song) {
      const container = document.getElementById('now-playing');
      if (!song) {
        container.classList.add('hidden');
        return;
      }
      container.classList.remove('hidden');
      document.getElementById('now-title').textContent = song.title;
      document.getElementById('now-requester').textContent = `Requested by ${song.requester}`;
      
      const thumbContainer = document.getElementById('now-thumbnail');
      thumbContainer.innerHTML = `
        <img src="https://i.ytimg.com/vi/${song.id}/hqdefault.jpg" 
             class="w-full h-full object-cover" alt="thumbnail">
      `;
    }

    function renderQueue(queue) {
      queueData = queue;
      const container = document.getElementById('queue-list');
      const countEl = document.getElementById('queue-count');
      const emptyEl = document.getElementById('empty-state');
      
      container.innerHTML = '';
      countEl.textContent = `(${queue.length})`;

      if (queue.length === 0) {
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');

      queue.forEach((song, i) => {
        const div = document.createElement('div');
        div.className = "song-card flex gap-4 bg-zinc-950 hover:bg-zinc-900 p-5 rounded-2xl group";
        div.innerHTML = `
          <img src="https://i.ytimg.com/vi/${song.id}/hqdefault.jpg" 
               class="w-16 h-16 rounded-xl object-cover flex-shrink-0">
          <div class="flex-1 min-w-0">
            <div class="font-medium leading-tight line-clamp-2">${song.title}</div>
            <div class="text-zinc-500 text-xs mt-2">by ${song.requester}</div>
          </div>
          <button onclick="removeSong(${i}); event.stopImmediatePropagation()" 
                  class="text-red-400 opacity-30 group-hover:opacity-100 text-3xl self-start">×</button>
        `;
        container.appendChild(div);
      });
    }

    function updateUI(state) {
      renderNowPlaying(state.nowPlaying);
      renderQueue(state.queue || []);
      
      if (state.nowPlaying && state.nowPlaying.id !== currentId) {
        playSong(state.nowPlaying.id);
      }
    }

    async function addSong() {
      const url = document.getElementById('url-input').value.trim();
      let requester = document.getElementById('requester-input').value.trim();
      if (!requester) requester = "Anonymous Skeleton";

      if (!url) return alert("Paste a YouTube link!");

      socket.emit('addSong', { url, requester });
      document.getElementById('url-input').value = '';
    }

    function skipCurrent() {
      if (confirm("Skip this song?")) {
        socket.emit('nextSong');
      }
    }

    function removeSong(index) {
      if (confirm("Remove from queue?")) {
        socket.emit('removeSong', index);
      }
    }

    function clearQueue() {
      if (confirm("NUKE THE ENTIRE QUEUE?")) {
        socket.emit('clearQueue');
      }
    }

    // Init everything
    window.onload = () => {
      initTailwind();
      loadYouTubeAPI();

      socket = io();

      socket.on('state', updateUI);
      socket.on('error', msg => alert(msg));

      // Enter key support
      document.getElementById('url-input').addEventListener('keypress', e => {
        if (e.key === 'Enter') addSong();
      });

      console.log('%cSkeleton Jukebox is LIVE 💀\nPaste links and jam!', 'color:#eab308; font-size:14px');
    };

    // Expose for onclick
    window.addSong = addSong;
    window.skipCurrent = skipCurrent;
    window.removeSong = removeSong;
    window.clearQueue = clearQueue;
  </script>
</body>
</html>
