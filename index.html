<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKELETON JUKEBOX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { background: #0a0a0a; }
    .pixel-font { font-family: 'Press Start 2P', system-ui; }
    .player-container { aspect-ratio: 16/9; position: relative; }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 lg:py-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6 lg:mb-10">
      <div class="flex items-center gap-3 lg:gap-4">
        <div class="w-12 h-12 sm:w-16 sm:h-16 bg-gradient-to-br from-red-600 to-yellow-400 rounded-2xl flex items-center justify-center text-4xl sm:text-5xl">🎧</div>
        <div>
          <h1 class="pixel-font text-3xl sm:text-4xl lg:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-yellow-300">SKELETON JUKEBOX</h1>
          <p class="text-yellow-300/80 text-xs sm:text-sm tracking-widest">ANYONE CAN REQUEST • QUEUE PLAYS IN ORDER</p>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
      <!-- Player -->
      <div class="lg:col-span-8">
        <div class="bg-zinc-950 border border-yellow-400/30 rounded-3xl overflow-hidden">
          <div id="player-container" class="player-container bg-black relative">
            <div id="player" class="w-full h-full"></div>
            <div id="autoplay-overlay" class="absolute inset-0 bg-black/90 flex items-center justify-center z-50 cursor-pointer">
              <div onclick="startPlaying()" class="text-center px-4">
                <div class="text-5xl sm:text-6xl mb-4">🎧</div>
                <div class="text-2xl sm:text-4xl font-black tracking-widest text-yellow-400">CLICK TO JOIN<br>THE PARTY!</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Now Playing -->
        <div id="now-playing" class="hidden px-4 sm:px-8 py-4 sm:py-6 bg-zinc-900 border border-zinc-700 rounded-3xl mt-6">
          <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 items-center">
            <div id="now-thumbnail" class="w-20 h-20 sm:w-24 sm:h-24 bg-zinc-800 rounded-2xl overflow-hidden flex-shrink-0"></div>
            <div class="flex-1 min-w-0">
              <div class="uppercase text-red-400 text-xs tracking-widest font-medium">NOW SCREAMING</div>
              <h2 id="now-title" class="text-xl sm:text-3xl font-bold truncate"></h2>
              <p id="now-artist" class="text-xs sm:text-sm text-zinc-400"></p>
              <p id="now-requester" class="text-zinc-400 text-sm"></p>
            </div>
            <button onclick="shareNowPlaying()" class="bg-yellow-400 text-black font-black px-6 py-3 rounded-2xl text-sm whitespace-nowrap flex-shrink-0">SHARE</button>
          </div>
        </div>
      </div>

      <!-- Request Form -->
      <div class="lg:col-span-4 bg-zinc-900 border border-zinc-700 rounded-3xl p-5 sm:p-8 flex flex-col">
        <h3 class="font-bold text-xl sm:text-2xl mb-4 sm:mb-6">REQUEST A SONG</h3>
        <input id="url-input" type="text" placeholder="https://youtu.be/..." class="w-full bg-black border border-zinc-700 rounded-2xl px-4 sm:px-6 py-4 sm:py-6 text-base sm:text-lg">
        <input id="requester-input" type="text" value="Skeleton Fan" class="mt-3 sm:mt-4 w-full bg-black border border-zinc-700 rounded-2xl px-4 sm:px-6 py-4 sm:py-6 text-base sm:text-lg">
        <button onclick="addSong()" class="mt-4 sm:mt-6 w-full bg-gradient-to-r from-yellow-400 to-red-500 py-4 sm:py-6 rounded-3xl text-lg sm:text-2xl font-black">THROW IT IN 👄</button>
      </div>

      <!-- Up Next -->
      <div class="lg:col-span-4 bg-zinc-900 border border-zinc-700 rounded-3xl p-5 sm:p-8 flex flex-col">
        <h3 class="font-bold text-xl sm:text-2xl mb-4 sm:mb-6">UP NEXT <span id="queue-count" class="text-yellow-400">(0)</span></h3>
        <div id="queue-list" class="flex-1 overflow-auto space-y-3 max-h-60 sm:max-h-none"></div>
        <div id="empty-state" class="flex-1 flex items-center justify-center text-zinc-500 hidden">Queue empty</div>
      </div>

      <!-- Previously Played -->
      <div class="lg:col-span-4 bg-zinc-900 border border-zinc-700 rounded-3xl p-5 sm:p-8 flex flex-col">
        <h3 class="font-bold text-xl sm:text-2xl mb-4 sm:mb-6">PREVIOUSLY PLAYED <span id="history-count"></span></h3>
        <div id="history-list" class="flex-1 overflow-auto space-y-3 max-h-60 sm:max-h-none"></div>
      </div>
    </div>
  </div>

  <!-- Share Toast -->
  <div id="share-toast" class="hidden fixed bottom-4 sm:bottom-8 left-4 sm:left-1/2 right-4 sm:right-auto sm:-translate-x-1/2 bg-zinc-900 border border-yellow-400 rounded-3xl px-4 sm:px-8 py-4 sm:py-5 shadow-2xl flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-6 z-[100]">
    <div class="flex-1">
      <div class="text-yellow-300 text-xs sm:text-sm">YOU JUST QUEUED</div>
      <div id="toast-song-title" class="font-bold text-base sm:text-lg"></div>
    </div>
    <div>
      <button onclick="shareQueuedSong()" class="bg-gradient-to-r from-yellow-400 to-red-500 text-black font-black px-6 py-3 sm:px-8 sm:py-4 rounded-2xl text-sm">BRAG ON X</button>
    </div>
    <button onclick="hideToast()" class="text-2xl sm:text-3xl text-zinc-500 absolute top-2 right-3 sm:relative sm:top-auto sm:right-auto">×</button>
  </div>

  <!-- Error Toast -->
  <div id="error-toast" class="hidden fixed bottom-4 sm:bottom-8 left-4 sm:left-1/2 right-4 sm:right-auto sm:-translate-x-1/2 bg-red-600/90 border border-red-400 rounded-3xl px-4 sm:px-8 py-4 sm:py-5 shadow-2xl flex items-center gap-3 sm:gap-4 z-[100]">
    <div class="text-2xl sm:text-3xl">⚠️</div>
    <div id="error-text" class="font-bold text-sm sm:text-base">Song blocked by YouTube – auto-skipping...</div>
  </div>

  <script>
let socket, player, currentId = null;
let playWatchdog = null;
let longWatchdog = null;   // safety net
const JUKEBOX_URL = "https://skeleton-jukebox.onrender.com";
let hasStarted = false;

window.onYouTubeIframeAPIReady = () => {
  player = new YT.Player('player', {
    width: '100%', height: '100%',
    playerVars: { autoplay: 1, controls: 1, modestbranding: 1 },
    events: { onStateChange: onPlayerStateChange, onError: onPlayerError }
  });
};

function onPlayerStateChange(e) {
  console.log(`[CLIENT] Player state: ${e.data}`);
  if (e.data === YT.PlayerState.PLAYING) {
    console.log('▶️ [CLIENT] Song PLAYING');
    if (playWatchdog) clearTimeout(playWatchdog);
    if (longWatchdog) clearTimeout(longWatchdog);
  }
  if (e.data === YT.PlayerState.ENDED) {
    console.log('🎬 [CLIENT] Video ENDED – requesting next');
    socket.emit('nextSong');
  }
}

function onPlayerError(event) {
  const blocked = [100, 101, 150, 5];
  if (blocked.includes(event.data)) {
    document.getElementById('error-text').textContent = 'Song blocked - auto-skipping...';
    document.getElementById('error-toast').classList.remove('hidden');
    setTimeout(() => {
      document.getElementById('error-toast').classList.add('hidden');
      socket.emit('nextSong');
    }, 1800);
  }
}

function playSong(id) {
  currentId = id;
  if (player) {
    player.loadVideoById(id);
    if (playWatchdog) clearTimeout(playWatchdog);
    if (longWatchdog) clearTimeout(longWatchdog);

    playWatchdog = setTimeout(() => {
      console.log('⏰ Short watchdog - forcing next');
      socket.emit('nextSong');
    }, 8000);

    // 8-minute max song length safety net
    longWatchdog = setTimeout(() => {
      console.log('🛡️ Long safety watchdog – forcing next song');
      socket.emit('nextSong');
    }, 8 * 60 * 1000);

    setTimeout(() => {
      if (!hasStarted && player) player.playVideo();
    }, 800);
  }
}

function startPlaying() {
  document.getElementById('autoplay-overlay').style.opacity = '0';
  setTimeout(() => document.getElementById('autoplay-overlay').style.display = 'none', 600);
  hasStarted = true;
  if (player && currentId) player.playVideo();
}

// Keep ALL your existing renderNowPlaying, renderQueue, renderHistory, updateUI, addSong, reQueue, shareNowPlaying, shareQueuedSong, hideToast, hideDuplicateToast, and window.onload exactly as in your current file.
// Only the top part (player setup + onPlayerStateChange + playSong) is replaced above.

window.onload = () => {
  socket = io();
  socket.on('state', updateUI);
  socket.on('error', alert);
  socket.on('duplicate', (data) => {
    document.getElementById('dup-song-title').textContent = `"${data.title}"`;
    document.getElementById('dup-message').textContent = data.position === "currently playing" ? "is currently playing!" : `is already queued at position #${data.position}`;
    document.getElementById('duplicate-toast').classList.remove('hidden');
    setTimeout(() => document.getElementById('duplicate-toast').classList.add('hidden'), 3500);
  });
};

window.addSong = addSong;
window.shareNowPlaying = shareNowPlaying;
window.shareQueuedSong = shareQueuedSong;
window.hideToast = hideToast;
window.startPlaying = startPlaying;
window.reQueue = reQueue;
window.hideDuplicateToast = () => document.getElementById('duplicate-toast').classList.add('hidden');
</script>
</body>
</html>
