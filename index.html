<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKELETON JUKEBOX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { background: #0a0a0a; }
    .pixel-font { font-family: 'Press Start 2P', system-ui; }
    .player-container { aspect-ratio: 16/9; position: relative; }
  </style>
</head>
<body class="text-white">
  <div class="max-w-6xl mx-auto p-8">
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 bg-gradient-to-br from-red-600 to-yellow-400 rounded-2xl flex items-center justify-center text-5xl">💀</div>
        <div>
          <h1 class="pixel-font text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-yellow-300">SKELETON JUKEBOX</h1>
          <p class="text-yellow-300/80 text-sm tracking-widest">ANYONE CAN REQUEST • QUEUE PLAYS IN ORDER</p>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-8">
        <div class="bg-zinc-950 border border-yellow-400/30 rounded-3xl overflow-hidden">
          <div id="player-container" class="player-container bg-black relative">
            <div id="player" class="w-full h-full"></div>
            <div id="autoplay-overlay" class="absolute inset-0 bg-black/90 flex items-center justify-center z-50 cursor-pointer">
              <div onclick="startPlaying()" class="text-center">
                <div class="text-6xl mb-6">🎵</div>
                <div class="text-4xl font-black tracking-widest text-yellow-400">CLICK TO JOIN<br>THE PARTY</div>
              </div>
            </div>
          </div>
          <div id="now-playing" class="px-8 py-6 hidden">
            <div class="flex gap-6 items-center">
              <div id="now-thumbnail" class="w-24 h-24 bg-zinc-900 rounded-2xl overflow-hidden ring-2 ring-yellow-400/50"></div>
              <div class="flex-1 min-w-0">
                <div class="uppercase text-red-400 text-xs tracking-[3px]">NOW SCREAMING</div>
                <h2 id="now-title" class="text-3xl font-bold truncate"></h2>
                <p id="now-requester" class="text-zinc-400 text-sm"></p>
              </div>
              <button onclick="shareNowPlaying()" class="bg-yellow-400 hover:bg-yellow-300 text-black font-black px-8 py-4 rounded-2xl text-sm">🔗 SHARE THIS BANGER</button>
            </div>
          </div>
        </div>

        <!-- Removed the entire controls row with SKIP and NEW SESSION buttons -->
      </div>

      <div class="lg:col-span-4 space-y-8">
        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8">
          <h3 class="font-bold text-2xl mb-6">📥 REQUEST A SONG</h3>
          <input id="url-input" type="text" placeholder="https://youtu.be/..." class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-6 text-lg">
          <input id="requester-input" type="text" value="Skeleton Fan" class="mt-4 w-full bg-black border border-zinc-700 rounded-2xl px-6 py-6 text-lg">
          <button onclick="addSong()" class="mt-6 w-full bg-gradient-to-r from-yellow-400 to-red-500 py-6 rounded-3xl text-2xl font-black">THROW IT IN THE QUEUE 🔥</button>
        </div>

        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 h-[300px] flex flex-col">
          <h3 class="font-bold text-2xl mb-6">UP NEXT <span id="queue-count">(0)</span></h3>
          <div id="queue-list" class="flex-1 overflow-auto space-y-3"></div>
          <div id="empty-state" class="flex-1 flex items-center justify-center text-zinc-500 hidden">Queue empty</div>
        </div>

        <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 h-[300px] flex flex-col">
          <h3 class="font-bold text-2xl mb-6">PREVIOUSLY PLAYED <span id="history-count">(0)</span></h3>
          <div id="history-list" class="flex-1 overflow-auto space-y-3"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TOASTS remain unchanged -->
  <div id="share-toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-zinc-900 border border-yellow-400 rounded-3xl px-8 py-5 shadow-2xl flex items-center gap-6 z-[100]">
    <div>
      <div class="text-yellow-300 text-sm">YOU JUST QUEUED</div>
      <div id="toast-song-title" class="font-bold text-lg"></div>
    </div>
    <button onclick="shareQueuedSong()" class="bg-gradient-to-r from-yellow-400 to-red-500 text-black font-black px-8 py-4 rounded-2xl">BRAG ON X 🔥</button>
    <button onclick="hideToast()" class="text-3xl text-zinc-500">×</button>
  </div>

  <div id="error-toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-red-600/90 border border-red-400 rounded-3xl px-8 py-5 shadow-2xl flex items-center gap-4 z-[100]">
    <div class="text-3xl">⛔</div>
    <div id="error-text" class="font-bold">Song blocked by YouTube — auto-skipping...</div>
  </div>

  <script>
    let socket, player, currentId = null;
    let lastEndedId = null;
    let endedDebounceTimer = null;
    const JUKEBOX_URL = "https://skeleton-jukebox.onrender.com";
    let hasStarted = false;

    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('player', {
        width: '100%', height: '100%',
        playerVars: { autoplay: 1, controls: 1, modestbranding: 1 },
        events: { onStateChange: onPlayerStateChange, onError: onPlayerError }
      });
    };

    function onPlayerStateChange(e) {
      if (e.data === YT.PlayerState.ENDED) {
        if (currentId && lastEndedId !== currentId) {
          lastEndedId = currentId;
          if (endedDebounceTimer) clearTimeout(endedDebounceTimer);
          endedDebounceTimer = setTimeout(() => {
            socket.emit('nextSong');
            endedDebounceTimer = null;
          }, 500);
        }
      }
    }

    function onPlayerError(event) {
      const blocked = [100, 101, 150, 5];
      if (blocked.includes(event.data)) {
        document.getElementById('error-text').textContent = `⛔ Song blocked — auto-skipping...`;
        document.getElementById('error-toast').classList.remove('hidden');
        setTimeout(() => {
          document.getElementById('error-toast').classList.add('hidden');
          socket.emit('nextSong');
        }, 1800);
      }
    }

    function playSong(id) {
      currentId = id;
      lastEndedId = null;
      if (player) {
        player.loadVideoById(id);
        setTimeout(() => {
          if (!hasStarted && player) player.playVideo();
        }, 800);
      }
    }

    function startPlaying() {
      document.getElementById('autoplay-overlay').style.opacity = '0';
      setTimeout(() => document.getElementById('autoplay-overlay').style.display = 'none', 600);
      hasStarted = true;
      if (player && currentId) player.playVideo();
    }

    function renderNowPlaying(song) {
      const container = document.getElementById('now-playing');
      if (!song) return container.classList.add('hidden');
      container.classList.remove('hidden');
      document.getElementById('now-title').textContent = song.title;
      document.getElementById('now-requester').textContent = `Requested by ${song.requester}`;
      document.getElementById('now-thumbnail').innerHTML = `<img src="https://i.ytimg.com/vi/${song.id}/hqdefault.jpg" class="w-full h-full object-cover">`;
    }

    function renderQueue(q) {
      const list = document.getElementById('queue-list');
      const count = document.getElementById('queue-count');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';
      count.textContent = `(${q.length})`;
      if (q.length === 0) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      q.forEach((song, i) => {
        const div = document.createElement('div');
        div.className = "flex gap-4 bg-zinc-950 p-5 rounded-2xl";
        div.innerHTML = `<img src="https://i.ytimg.com/vi/${song.id}/hqdefault.jpg" class="w-16 h-16 rounded-xl"><div class="flex-1"><div class="font-medium">${song.title}</div><div class="text-xs text-zinc-500">by ${song.requester}</div></div><button onclick="removeSong(${i});event.stopImmediatePropagation()" class="text-red-400 text-3xl">×</button>`;
        list.appendChild(div);
      });
    }

    function renderHistory(h) {
      const list = document.getElementById('history-list');
      const count = document.getElementById('history-count');
      list.innerHTML = '';
      count.textContent = `(${h.length})`;
      h.forEach((song, i) => {
        const div = document.createElement('div');
        div.className = "flex gap-4 bg-zinc-950 p-5 rounded-2xl";
        div.innerHTML = `<img src="https://i.ytimg.com/vi/${song.id}/hqdefault.jpg" class="w-16 h-16 rounded-xl"><div class="flex-1"><div class="font-medium">${song.title}</div><div class="text-xs text-zinc-500">by ${song.requester}</div></div><button onclick="reQueue(${i});event.stopImmediatePropagation()" class="text-yellow-400 font-black text-sm px-4">↺ RE-QUEUE</button>`;
        list.appendChild(div);
      });
    }

    function updateUI(state) {
      renderNowPlaying(state.nowPlaying);
      renderQueue(state.queue || []);
      renderHistory(state.history || []);
      if (state.nowPlaying && state.nowPlaying.id !== currentId) {
        lastEndedId = null;
        playSong(state.nowPlaying.id);
      }
    }

    async function addSong() {
      const url = document.getElementById('url-input').value.trim();
      let requester = document.getElementById('requester-input').value.trim() || "Skeleton Fan";
      if (!url) return alert("Paste a YouTube link!");
      socket.emit('addSong', { url, requester });
      document.getElementById('url-input').value = '';
      socket.once('state', (state) => {
        if (state.queue && state.queue.length > 0) {
          document.getElementById('toast-song-title').textContent = state.queue[state.queue.length-1].title;
          document.getElementById('share-toast').classList.remove('hidden');
        }
      });
    }

    function reQueue(i) { socket.emit('reQueue', i); }
    function shareNowPlaying() {
      const title = document.getElementById('now-title').textContent;
      if (!title) return;
      const text = `I'm listening to "${title}" in The Skeleton Jukebox right now! 💀🎵\n\nJoin: ${JUKEBOX_URL}`;
      navigator.clipboard.writeText(text).then(() => alert("✅ Copied!"));
    }
    function shareQueuedSong() {
      const title = document.getElementById('toast-song-title').textContent;
      const text = `I just queued "${title}" in The Skeleton Jukebox! 💀🔥\n\nJoin: ${JUKEBOX_URL}`;
      navigator.clipboard.writeText(text).then(() => { alert("✅ Copied!"); hideToast(); });
    }
    function hideToast() { document.getElementById('share-toast').classList.add('hidden'); }
    function removeSong(i) { if (confirm("Remove?")) socket.emit('removeSong', i); }

    window.onload = () => {
      socket = io();
      socket.on('state', updateUI);
      socket.on('error', alert);
    };

    window.addSong = addSong;
    window.removeSong = removeSong;
    window.shareNowPlaying = shareNowPlaying;
    window.shareQueuedSong = shareQueuedSong;
    window.hideToast = hideToast;
    window.startPlaying = startPlaying;
    window.reQueue = reQueue;
  </script>
</body>
</html>
