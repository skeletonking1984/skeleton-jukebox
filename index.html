<script>
  let socket, player, currentId = null;
  const JUKEBOX_URL = "https://skeleton-jukebox.onrender.com";
  let hasStarted = false;

  window.onYouTubeIframeAPIReady = () => {
    player = new YT.Player('player', {
      width: '100%', height: '100%',
      playerVars: { autoplay: 1, controls: 1, modestbranding: 1 },
      events: { onStateChange: onPlayerStateChange, onError: onPlayerError }
    });
  };

  function onPlayerStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) {
      socket.emit('nextSong');  // Just emit once – server guards duplicates
    }
  }

  function onPlayerError(event) {
    const blocked = [100, 101, 150, 5];
    if (blocked.includes(event.data)) {
      document.getElementById('error-text').textContent = `⛔ Song blocked — auto-skipping...`;
      document.getElementById('error-toast').classList.remove('hidden');
      setTimeout(() => {
        document.getElementById('error-toast').classList.add('hidden');
        socket.emit('nextSong');
      }, 1800);
    }
  }

  function playSong(id) {
    currentId = id;
    if (player) {
      player.loadVideoById(id);
      setTimeout(() => {
        if (!hasStarted && player) player.playVideo();
      }, 800);
    }
  }

  function startPlaying() {
    document.getElementById('autoplay-overlay').style.opacity = '0';
    setTimeout(() => document.getElementById('autoplay-overlay').style.display = 'none', 600);
    hasStarted = true;
    if (player && currentId) player.playVideo();
  }

  function renderNowPlaying(song) {
    const container = document.getElementById('now-playing');
    if (!song) return container.classList.add('hidden');
    container.classList.remove('hidden');
    document.getElementById('now-title').textContent = song.title;
    document.getElementById('now-requester').textContent = `Requested by ${song.requester}`;
    document.getElementById('now-thumbnail').innerHTML = `<img src="https://i.ytimg.com/vi/${song.id}/hqdefault.jpg" class="w-full h-full object-cover">`;
  }

  function renderQueue(q) {
    const list = document.getElementById('queue-list');
    const count = document.getElementById('queue-count');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';
    count.textContent = `(${q.length})`;
    if (q.length === 0) { 
      empty.classList.remove('hidden'); 
      return; 
    }
    empty.classList.add('hidden');
    q.forEach((song) => {
      const div = document.createElement('div');
      div.className = "flex gap-4 bg-zinc-950 p-5 rounded-2xl";
      div.innerHTML = `
        <img src="https://i.ytimg.com/vi/${song.id}/hqdefault.jpg" class="w-16 h-16 rounded-xl">
        <div class="flex-1">
          <div class="font-medium">${song.title}</div>
          <div class="text-xs text-zinc-500">by ${song.requester}</div>
        </div>
      `;
      list.appendChild(div);
    });
  }

  function renderHistory(h) {
    const list = document.getElementById('history-list');
    const count = document.getElementById('history-count');
    list.innerHTML = '';
    count.textContent = `(${h.length})`;
    h.forEach((song, i) => {
      const div = document.createElement('div');
      div.className = "flex gap-4 bg-zinc-950 p-5 rounded-2xl";
      div.innerHTML = `
        <img src="https://i.ytimg.com/vi/${song.id}/hqdefault.jpg" class="w-16 h-16 rounded-xl">
        <div class="flex-1">
          <div class="font-medium">${song.title}</div>
          <div class="text-xs text-zinc-500">by ${song.requester}</div>
        </div>
        <button onclick="reQueue(${i});event.stopImmediatePropagation()" class="text-yellow-400 font-black text-sm px-4">↺ RE-QUEUE</button>
      `;
      list.appendChild(div);
    });
  }

  function updateUI(state) {
    renderNowPlaying(state.nowPlaying);
    renderQueue(state.queue || []);
    renderHistory(state.history || []);
    if (state.nowPlaying && state.nowPlaying.id !== currentId) {
      playSong(state.nowPlaying.id);
    }
  }

  async function addSong() {
    const url = document.getElementById('url-input').value.trim();
    let requester = document.getElementById('requester-input').value.trim() || "Skeleton Fan";
    if (!url) return alert("Paste a YouTube link!");
    socket.emit('addSong', { url, requester });
    document.getElementById('url-input').value = '';
    socket.once('state', (state) => {
      if (state.queue && state.queue.length > 0) {
        document.getElementById('toast-song-title').textContent = state.queue[state.queue.length-1].title;
        document.getElementById('share-toast').classList.remove('hidden');
      }
    });
  }

  function reQueue(i) { socket.emit('reQueue', i); }
  function shareNowPlaying() {
    const title = document.getElementById('now-title').textContent;
    if (!title) return;
    const text = `I'm listening to "${title}" in The Skeleton Jukebox right now! 💀🎵\n\nJoin: ${JUKEBOX_URL}`;
    navigator.clipboard.writeText(text).then(() => alert("✅ Copied!"));
  }
  function shareQueuedSong() {
    const title = document.getElementById('toast-song-title').textContent;
    const text = `I just queued "${title}" in The Skeleton Jukebox! 💀🔥\n\nJoin: ${JUKEBOX_URL}`;
    navigator.clipboard.writeText(text).then(() => { alert("✅ Copied!"); hideToast(); });
  }
  function hideToast() { document.getElementById('share-toast').classList.add('hidden'); }

  window.onload = () => {
    socket = io();
    socket.on('state', updateUI);
    socket.on('error', alert);
  };

  window.addSong = addSong;
  window.shareNowPlaying = shareNowPlaying;
  window.shareQueuedSong = shareQueuedSong;
  window.hideToast = hideToast;
  window.startPlaying = startPlaying;
  window.reQueue = reQueue;
</script>
